<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #000, #1a001a);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3em;
}

#lockScreen {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: pink;
    cursor: pointer;
    margin-top: 10px;
}

#content {
    display: none;
    padding: 20px;
    animation: fadeIn 2s;
}

.img {
    width: 220px;
    border-radius: 15px;
    margin: 10px;
    transition: transform 0.3s;
}

.img:hover {
    transform: scale(1.1);
}

.letter {
    margin-top: 20px;
    font-size: 18px;
    white-space: pre-line;
    border-right: 2px solid white;
    width: 0;
    overflow: hidden;
}

.reveal {
    display: none;
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 15px;
}

.heart {
    position: fixed;
    bottom: -20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Countdown */
#countdown {
    margin-top: 20px;
    font-size: 20px;
}

</style>
</head>

<body>

<div id="lockScreen">
    <h2>Enter Password 🔐</h2>
    <input type="password" id="password">
    <button onclick="checkPassword()">Unlock ❤️</button>
</div>

<div id="content">
    <h1>For my Vampi ❤️</h1>

    <div id="countdown"></div>

    <img src="photo1.jpg" class="img">
    <img src="photo2.jpg" class="img">
    <img src="photo3.jpg" class="img">

    <div class="letter" id="letterText">
Dear Love ❤️,

Happy Birthday my Vampi ❤️

I don’t know how, but you became my favorite person 🥺...
The way you hold my hand, everything feels right 💕
I just want you, always ❤️

Your real celebration is pending... 😛👀❤️

Happy 20th, my love ❤️✨
    </div>

    <button onclick="revealMessage()">Click for surprise 💝</button>

    <div class="reveal" id="secretMsg">
        I LOVE YOU FOREVER ❤️🥺
    </div>
</div>

<audio id="music" loop controls>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let correctPassword = "vampi2006";

function checkPassword() {
    let input = document.getElementById("password").value;

    if (input === correctPassword) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("content").style.display = "block";

        startTyping();
        startConfetti();
        startCountdown();

        let music = document.getElementById("music");
        music.play().catch(()=>{});
    } else {
        alert("Wrong password 😢");
    }
}

function revealMessage() {
    document.getElementById("secretMsg").style.display = "block";
}

/* Typing effect */
function startTyping() {
    let text = document.getElementById("letterText");
    let content = text.innerText;
    text.innerText = "";
    let i = 0;

    function type() {
        if (i < content.length) {
            text.innerText += content.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* Floating emojis */
setInterval(() => {
    let el = document.createElement("div");
    let emojis = ["💖","💝","🎉","🎂","❤️"];

    el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    el.classList.add("heart");
    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}, 300);

/* Confetti */
function startConfetti() {
    setInterval(() => {
        let conf = document.createElement("div");
        conf.innerHTML = "🎊";
        conf.style.position = "fixed";
        conf.style.top = "0";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.fontSize = "20px";
        conf.style.animation = "floatUp 5s linear";

        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),5000);
    }, 200);
}

/* Countdown (next meet 😏) */
function startCountdown() {
    let target = new Date();
    target.setDate(target.getDate() + 5);

    setInterval(() => {
        let now = new Date();
        let diff = target - now;

        let d = Math.floor(diff / (1000*60*60*24));
        let h = Math.floor((diff/(1000*60*60)) % 24);
        let m = Math.floor((diff/(1000*60)) % 60);

        document.getElementById("countdown").innerText =
            "Next time I see you in: " + d + "d " + h + "h " + m + "m ❤️";
    }, 1000);
}
</script>

</body>
</html>
